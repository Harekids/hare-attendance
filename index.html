<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hare</title>
<style>
  :root{
    --ink:#2a2440;
    --sky:#5b8def;
    --sky-deep:#3a6fd8;
    --sun:#ffb53d;
    --sun-soft:#ffd27a;
    --coral:#ff7a6b;
    --mint:#2bc4a0;
    --paper:#fdfcfa;
    --mist:#eef1f8;
    --line:#e3e7f2;
    --shadow:rgba(58,111,216,.14);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{
    font-family:-apple-system,"Hiragino Sans","Hiragino Kaku Gothic ProN","Yu Gothic",system-ui,sans-serif;
    background:
      radial-gradient(120% 80% at 80% -10%, #fff0d4 0%, transparent 45%),
      radial-gradient(100% 70% at 0% 110%, #dbe7ff 0%, transparent 50%),
      linear-gradient(170deg,#fdfcfa 0%,#f4f6fc 100%);
    color:var(--ink);min-height:100vh;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:22px 16px;
  }
  .stage{width:100%;max-width:400px}
  .card{
    background:var(--paper);border-radius:30px;padding:30px 26px;
    box-shadow:0 20px 50px var(--shadow), 0 2px 6px rgba(42,36,64,.04);
    border:1px solid rgba(255,255,255,.8);position:relative;overflow:hidden;
  }

  .sun{position:absolute;top:-34px;right:-34px;width:96px;height:96px;pointer-events:none}
  .sun .core{position:absolute;inset:26px;border-radius:50%;
    background:radial-gradient(circle at 38% 35%,var(--sun-soft),var(--sun));
    box-shadow:0 0 22px rgba(255,181,61,.5)}
  .sun .ray{position:absolute;top:50%;left:50%;width:5px;height:15px;border-radius:3px;
    background:var(--sun);opacity:.85;transform-origin:50% 280%}

  .eyebrow{font-size:12px;font-weight:800;letter-spacing:.14em;color:var(--sky);text-transform:uppercase;margin-bottom:14px}
  h1.title{font-size:26px;font-weight:900;letter-spacing:-.01em;line-height:1.25;margin-bottom:6px}
  .sub{font-size:14px;color:#8b88a0;font-weight:600;margin-bottom:24px;line-height:1.6}

  label.fld{display:block;font-size:12px;font-weight:800;color:#8b88a0;margin:0 0 8px 2px;letter-spacing:.02em}
  input.txt{
    width:100%;font-family:inherit;font-size:18px;font-weight:700;color:var(--ink);
    padding:16px 18px;border:2px solid var(--line);border-radius:18px;background:#fff;
    transition:border-color .2s, box-shadow .2s;letter-spacing:.02em;
  }
  input.txt::placeholder{color:#c2c0d0;font-weight:600}
  input.txt:focus{outline:none;border-color:var(--sky);box-shadow:0 0 0 4px rgba(91,141,239,.12)}

  .btn{
    width:100%;font-family:inherit;font-size:17px;font-weight:800;color:#fff;
    background:linear-gradient(135deg,var(--sky) 0%,var(--sky-deep) 100%);
    border:none;border-radius:18px;padding:17px;cursor:pointer;letter-spacing:.06em;
    box-shadow:0 10px 24px rgba(58,111,216,.28);transition:transform .12s, box-shadow .2s;margin-top:22px;
  }
  .btn:active{transform:translateY(2px);box-shadow:0 5px 14px rgba(58,111,216,.24)}

  .meta{font-size:12px;color:#a8a6ba;font-weight:700;text-align:center;margin-top:18px;letter-spacing:.02em}
  .meta.live{color:var(--mint)}
  .changelink{color:var(--sky);cursor:pointer;border-bottom:1.5px solid rgba(91,141,239,.3);padding-bottom:1px}

  .stand{text-align:center;padding:6px 0}
  .stand .glyph{font-size:54px;margin-bottom:14px;display:inline-block}
  .stand h2{font-size:22px;font-weight:900;margin-bottom:8px}
  .stand p{font-size:14px;color:#8b88a0;font-weight:600;line-height:1.6}
  .idtag{display:inline-block;margin-top:18px;font-size:13px;font-weight:800;color:var(--sky-deep);background:var(--mist);padding:8px 16px;border-radius:99px;letter-spacing:.03em}

  .qhead{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
  .clock{font-size:12px;font-weight:800;color:#a8a6ba;letter-spacing:.1em;text-transform:uppercase}
  .ring{position:relative;width:56px;height:56px}
  .ring svg{transform:rotate(-90deg)}
  .ring .num{position:absolute;inset:0;display:grid;place-items:center;font-size:21px;font-weight:900;color:var(--coral)}
  .qtext{font-size:22px;font-weight:900;line-height:1.4;margin-bottom:6px;letter-spacing:-.01em}
  .choice{
    width:100%;text-align:left;font-family:inherit;font-size:16px;font-weight:700;color:var(--ink);
    background:#fff;border:2px solid var(--line);border-radius:18px;
    padding:16px 18px;margin-top:12px;cursor:pointer;transition:.15s;display:flex;align-items:center;gap:13px;
  }
  .choice:active{transform:scale(.985)}
  .choice .mk{width:28px;height:28px;flex:0 0 28px;border-radius:9px;background:var(--mist);color:var(--sky-deep);font-weight:900;display:grid;place-items:center;font-size:14px}
  .choice.sel{border-color:var(--sky);background:#f3f7ff}
  .choice.sel .mk{background:var(--sky);color:#fff}

  .done{text-align:center;padding:10px 0}
  .done .mark{
    width:84px;height:84px;margin:0 auto 16px;border-radius:50%;
    display:grid;place-items:center;font-size:30px;font-weight:900;color:#fff;
    background:linear-gradient(135deg,var(--mint),#1ba588);box-shadow:0 12px 28px rgba(43,196,160,.36);
  }
  .done .mark.miss{background:linear-gradient(135deg,var(--coral),#ec5a4a);box-shadow:0 12px 28px rgba(255,122,107,.36)}
  .done h2{font-size:26px;font-weight:900;margin-bottom:8px}
  .done p{font-size:14px;color:#8b88a0;font-weight:600;line-height:1.6}

  .hidden{display:none!important}
  @keyframes pop{0%{transform:scale(.72);opacity:0}60%{transform:scale(1.06)}100%{transform:scale(1);opacity:1}}
  .pop{animation:pop .42s cubic-bezier(.2,.9,.3,1.3)}
  @media (prefers-reduced-motion: reduce){ .pop{animation:none} }
</style>
</head>
<body>

<div class="stage">

  <!-- 最初の画面 -->
  <div id="p-login" class="card">
    <div class="sun" id="sun-login"></div>
    <div class="eyebrow">Hare</div>
    <h1 class="title">こんにちは</h1>
    <div class="sub">学籍番号を入れて、はじめてね。</div>
    <label class="fld">学籍番号（半角英数字）</label>
    <input class="txt" id="sid" placeholder="21B0457" autocomplete="off" inputmode="latin">
    <button class="btn" onclick="studentLogin()">はじめる</button>
    <div class="meta" id="conn-login">サーバーに接続しています…</div>
  </div>

  <!-- 待機 -->
  <div id="p-wait" class="card hidden">
    <div class="sun" id="sun-wait"></div>
    <div class="stand">
      <span class="glyph">✏️</span>
      <h2>待機中…</h2>
      <p>先生が問題を出すと、ここに表示されます。</p>
      <div class="idtag" id="wait-id"></div>
      <div class="meta" style="margin-top:14px"><span class="changelink" onclick="changeId()">学籍番号を変える</span></div>
    </div>
  </div>

  <!-- 回答 -->
  <div id="p-quiz" class="card hidden">
    <div class="qhead">
      <span class="clock">のこり</span>
      <div class="ring">
        <svg width="56" height="56"><circle cx="28" cy="28" r="23" fill="none" stroke="#eee" stroke-width="6"/>
        <circle id="s-prog" cx="28" cy="28" r="23" fill="none" stroke="#ff7a6b" stroke-width="6" stroke-linecap="round"/></svg>
        <div class="num" id="s-num">20</div>
      </div>
    </div>
    <div class="qtext" id="s-q"></div>
    <div id="s-choices"></div>
  </div>

  <!-- 結果 -->
  <div id="p-done" class="card hidden">
    <div class="done">
      <div class="mark" id="s-mark">OK!</div>
      <h2 id="s-h2">記録しました</h2>
      <p id="s-msg"></p>
      <div class="idtag" id="done-id" style="margin-top:18px"></div>
    </div>
  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
import { getDatabase, ref, set, onValue }
  from "https://www.gstatic.com/firebasejs/11.0.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDFrBTNx6BUhZ7AvLRi5IPojUFJU8m0QrQ",
  authDomain: "hare-attendance.firebaseapp.com",
  databaseURL: "https://hare-attendance-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "hare-attendance",
  storageBucket: "hare-attendance.firebasestorage.app",
  messagingSenderId: "679564882976",
  appId: "1:679564882976:web:bc06fb20db197e9a2cb845"
};
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

function drawSun(el){
  if(!el) return;
  el.innerHTML='<div class="core"></div>';
  const n=12;
  for(let i=0;i<n;i++){
    const r=document.createElement('div'); r.className='ray';
    r.style.transform=`translate(-50%,-50%) rotate(${i*(360/n)}deg)`;
    el.appendChild(r);
  }
}
drawSun(document.getElementById('sun-login'));
drawSun(document.getElementById('sun-wait'));

function show(id){
  ['p-login','p-wait','p-quiz','p-done'].forEach(p=>document.getElementById(p).classList.add('hidden'));
  const e=document.getElementById(id);e.classList.remove('hidden');
  e.classList.add('pop');setTimeout(()=>e.classList.remove('pop'),420);
}

function deviceId(){
  let d=null; try{ d=localStorage.getItem('hare_device'); }catch(e){}
  if(!d){ d='dev_'+Math.random().toString(36).slice(2)+Date.now().toString(36); try{localStorage.setItem('hare_device',d);}catch(e){} }
  return d;
}
const DEVICE=deviceId();

let student={id:null};
let timer=null, curQ=null, answeredThisRound=false, lastSeenRound=null;

function savedId(){ try{ return localStorage.getItem('hare_sid')||''; }catch(e){ return ''; } }
function rememberId(id){ try{ localStorage.setItem('hare_sid',id); }catch(e){} }

function studentLogin(){
  const id=document.getElementById('sid').value.trim();
  if(!id){ document.getElementById('sid').focus(); return; }
  student.id=id; rememberId(id);
  document.getElementById('wait-id').textContent='学籍番号：'+id;
  show('p-wait'); studentWatch();
}
window.studentLogin=studentLogin;

function changeId(){
  document.getElementById('sid').value=student.id||'';
  show('p-login');
  setTimeout(()=>{ const f=document.getElementById('sid'); f.focus(); f.select(); },120);
}
window.changeId=changeId;

function studentWatch(){
  onValue(ref(db,'live'),(snap)=>{
    const q=snap.val();
    if(!q){ if(!isAnsweringOrDone()) show('p-wait'); return; }
    const roundId=q.openAt;
    if(q.status==='open' && Date.now()<q.endAt){
      if(roundId!==lastSeenRound){ lastSeenRound=roundId; answeredThisRound=false; startStudentQuiz(q); }
    }
  });
}
function isAnsweringOrDone(){
  return !document.getElementById('p-quiz').classList.contains('hidden')
      || !document.getElementById('p-done').classList.contains('hidden');
}

function startStudentQuiz(q){
  curQ=q; answeredThisRound=false;
  document.getElementById('s-q').textContent=q.text;
  const box=document.getElementById('s-choices');box.innerHTML='';
  const marks=['A','B','C','D','E'];
  q.options.forEach((o,i)=>{
    const b=document.createElement('button');b.className='choice';
    const mk=document.createElement('span');mk.className='mk';mk.textContent=marks[i];
    const tx=document.createElement('span');tx.textContent=o;
    b.appendChild(mk);b.appendChild(tx);
    b.onclick=()=>chooseAnswer(i,b);
    box.appendChild(b);
  });
  const prog=document.getElementById('s-prog');const C=2*Math.PI*23;prog.style.strokeDasharray=C;
  const draw=()=>{ const left=Math.max(0,Math.ceil((q.endAt-Date.now())/1000));
    document.getElementById('s-num').textContent=left; prog.style.strokeDashoffset=C*(1-left/q.sec); return left; };
  draw(); show('p-quiz');
  clearInterval(timer);
  timer=setInterval(()=>{ const left=draw(); if(left<=0){ clearInterval(timer); if(!answeredThisRound) timeUp(); } },250);
}

async function chooseAnswer(i,el){
  if(answeredThisRound)return; answeredThisRound=true; clearInterval(timer);
  document.querySelectorAll('.choice').forEach(c=>c.style.pointerEvents='none');
  el.classList.add('sel');
  const correct=(i===curQ.correctIndex);
  const score=(curQ.ptAttend||0)+(correct?(curQ.ptCorrect||0):0);
  const record={ id:student.id, choice:i, correct, score, device:DEVICE, round:curQ.openAt, at:Date.now() };
  const key='r'+curQ.openAt+'_'+DEVICE;
  try{ await set(ref(db,'answers/'+key), record); }catch(e){}
  document.getElementById('s-mark').className='mark';
  document.getElementById('s-mark').textContent='OK!';
  document.getElementById('s-h2').textContent='記録しました';
  document.getElementById('s-msg').textContent='その場にいた証明、ちゃんと届きました。';
  document.getElementById('done-id').textContent='学籍番号：'+student.id;
  show('p-done');
  setTimeout(()=>backToWait(),4000);
}
function timeUp(){
  document.getElementById('s-mark').className='mark miss';
  document.getElementById('s-mark').textContent='—';
  document.getElementById('s-h2').textContent='時間切れ';
  document.getElementById('s-msg').textContent='間に合わなかったときは、先生に直接ひとこと言えば大丈夫。';
  document.getElementById('done-id').textContent='学籍番号：'+student.id;
  show('p-done');
  setTimeout(()=>backToWait(),4000);
}
function backToWait(){ if(student.id){ show('p-wait'); } }

onValue(ref(db,'.info/connected'),(s)=>{
  const ok=s.val()===true;
  const e=document.getElementById('conn-login');
  if(e){ e.textContent= ok?'サーバーに接続しています':'接続を待っています…'; e.className='meta'+(ok?' live':''); }
});

(function(){ const s=savedId(); if(s){ document.getElementById('sid').value=s; } })();
</script>
</body>
</html>
