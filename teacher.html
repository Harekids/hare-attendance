<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hare 出席（先生用）</title>
<style>
  :root{
    --ink:#1b2a4a; --grape:#6c5ce7; --grape-deep:#4834c4;
    --mint:#13c6a5; --coral:#ff6b6b; --sun:#ffc844;
    --cloud:#ede7f6; --shadow:rgba(72,52,196,.18);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{
    font-family:-apple-system,"Hiragino Sans","Hiragino Kaku Gothic ProN","Yu Gothic",system-ui,sans-serif;
    background:
      radial-gradient(circle at 12% 8%, #fff3d6 0 22%, transparent 40%),
      radial-gradient(circle at 88% 14%, #e0d5ff 0 20%, transparent 38%),
      linear-gradient(160deg,#fdfbff 0%,#f3eeff 100%);
    color:var(--ink);min-height:100vh;
    display:flex;flex-direction:column;align-items:center;padding:18px 14px 60px;
  }
  .brand{font-weight:900;font-size:15px;color:var(--grape-deep);margin-bottom:14px;letter-spacing:.04em;display:flex;align-items:center;gap:7px}
  .brand .dot{width:10px;height:10px;border-radius:50%;background:linear-gradient(135deg,var(--sun),var(--coral))}
  .brand .tag{font-size:11px;background:var(--grape);color:#fff;padding:2px 9px;border-radius:99px;margin-left:4px}
  .stage{width:100%;max-width:440px}
  .card{background:#fff;border-radius:26px;padding:26px 22px;box-shadow:0 14px 38px var(--shadow);border:3px solid #fff;position:relative;overflow:hidden}
  .card::before{content:"";position:absolute;top:-40px;right:-40px;width:120px;height:120px;background:radial-gradient(circle,var(--sun) 0 60%,transparent 62%);opacity:.22}
  h1.title{font-size:22px;font-weight:900;margin-bottom:4px;position:relative}
  .sub{font-size:13px;color:#8a85a6;font-weight:700;margin-bottom:20px}
  label.fld{display:block;font-size:12.5px;font-weight:800;color:#7a749c;margin:0 0 7px 3px}
  input.txt{width:100%;font-family:inherit;font-size:17px;font-weight:700;color:var(--ink);padding:14px 16px;border:2.5px solid var(--cloud);border-radius:16px;background:#faf8ff;transition:.2s}
  input.txt:focus{outline:none;border-color:var(--grape);background:#fff}
  .btn{width:100%;font-family:inherit;font-size:17px;font-weight:900;color:#fff;background:linear-gradient(135deg,var(--grape),var(--grape-deep));border:none;border-radius:16px;padding:16px;cursor:pointer;box-shadow:0 8px 20px var(--shadow);transition:transform .12s,box-shadow .2s;margin-top:18px;letter-spacing:.03em}
  .btn:active{transform:translateY(2px) scale(.99)}
  .btn.mint{background:linear-gradient(135deg,var(--mint),#0fa389)}
  .btn.ghost{background:#fff;color:var(--grape);border:2.5px solid var(--cloud);box-shadow:none}
  .opt-row{display:flex;align-items:center;gap:8px;margin-bottom:9px}
  .opt-row input.txt{padding:11px 13px;font-size:15px}
  .opt-pick{width:30px;height:30px;flex:0 0 30px;border-radius:50%;border:2.5px solid var(--cloud);background:#fff;cursor:pointer;font-weight:900;color:#cfc8e8;font-size:15px;display:grid;place-items:center;transition:.15s}
  .opt-pick.correct{background:var(--mint);border-color:var(--mint);color:#fff}
  .seconds{display:flex;gap:8px;margin-top:6px}
  .seconds button{flex:1;border:2.5px solid var(--cloud);background:#fff;border-radius:13px;padding:11px;font-family:inherit;font-weight:800;color:#8a85a6;cursor:pointer;font-size:14px;transition:.15s}
  .seconds button.on{border-color:var(--grape);background:var(--grape);color:#fff}
  .pts{display:flex;gap:10px}
  .pts>div{flex:1}
  .pts input.txt{text-align:center}
  .ringwrap{display:flex;justify-content:center;margin:6px 0 16px}
  .ring{position:relative;width:120px;height:120px}
  .ring svg{transform:rotate(-90deg)}
  .ring .num{position:absolute;inset:0;display:grid;place-items:center;font-size:40px;font-weight:900;color:var(--grape-deep)}
  .pill{display:inline-block;background:var(--cloud);color:var(--grape-deep);font-weight:800;font-size:12px;padding:5px 12px;border-radius:999px;margin-bottom:14px}
  .hint{font-size:12px;color:#a59fc0;text-align:center;margin-top:14px;line-height:1.6;font-weight:600}
  .hidden{display:none!important}
  .tally{background:#faf8ff;border:2.5px solid var(--cloud);border-radius:16px;padding:16px;margin-top:8px}
  .tally .row{display:flex;justify-content:space-between;font-weight:800;font-size:14px;padding:7px 2px;color:#6a6488}
  .tally .row b{color:var(--grape-deep)}
  .tally .bar{height:8px;background:var(--cloud);border-radius:99px;margin-top:4px;overflow:hidden}
  .tally .bar i{display:block;height:100%;background:var(--grape);border-radius:99px}
  .who{font-size:12px;color:#8a85a6;font-weight:700;margin-top:10px;line-height:1.7}
  .who b{color:var(--grape-deep)}
  .draftrow{display:flex;align-items:center;gap:10px;background:#faf8ff;border:2.5px solid var(--cloud);border-radius:14px;padding:12px 14px;margin-bottom:9px}
  .draftrow .qt{flex:1;font-weight:800;font-size:14px;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .draftrow .go{background:var(--mint);color:#fff;border:none;border-radius:10px;padding:8px 14px;font-family:inherit;font-weight:900;font-size:13px;cursor:pointer}
  .draftrow .del{background:none;border:none;color:#c9c3dd;font-size:18px;cursor:pointer;font-weight:900}
  .conn{font-size:11px;font-weight:800;text-align:center;margin-top:16px;color:#b7b1cc}
  .conn.ok{color:var(--mint)}
  .rsum{display:flex;gap:10px;margin-bottom:16px}
  .rsum .box{flex:1;background:#faf8ff;border:2px solid var(--cloud);border-radius:14px;padding:12px;text-align:center}
  .rsum .box b{display:block;font-size:22px;font-weight:900;color:var(--grape-deep)}
  .rsum .box span{font-size:11px;font-weight:800;color:#8a85a6}
  .rtable-wrap{overflow-x:auto;border:2px solid var(--cloud);border-radius:14px;margin-bottom:8px;-webkit-overflow-scrolling:touch}
  table.rt{border-collapse:collapse;width:100%;font-size:13px}
  table.rt th,table.rt td{padding:9px 11px;text-align:center;white-space:nowrap;border-bottom:1px solid var(--cloud)}
  table.rt th{background:#f3eeff;font-weight:800;color:var(--grape-deep);position:sticky;top:0}
  table.rt td:first-child,table.rt th:first-child{text-align:left;font-weight:800;position:sticky;left:0;background:#fff;z-index:1}
  table.rt th:first-child{background:#f3eeff;z-index:2}
  table.rt .ok{color:var(--mint);font-weight:900}
  table.rt .cor{color:var(--grape-deep);font-weight:900}
  table.rt .miss{color:#d8d3e6}
  table.rt tr:last-child td{border-bottom:none}
  .rempty{text-align:center;color:#a8a6ba;font-weight:700;padding:30px 0;font-size:14px}
  @keyframes pop{0%{transform:scale(.7);opacity:0}60%{transform:scale(1.08)}100%{transform:scale(1);opacity:1}}
  .pop{animation:pop .4s cubic-bezier(.2,.9,.3,1.3)}
</style>
</head>
<body>

<div class="brand"><span class="dot"></span>Hare 出席<span class="tag">先生用</span></div>

<div class="stage">

  <!-- 問題づくり＆下書き -->
  <div id="p-make" class="card">
    <h1 class="title">きょうの問題</h1>
    <div class="sub">聞いてないと答えられない問いがコツ</div>
    <label class="fld">問題文</label>
    <input class="txt" id="qtext" placeholder="例：今日の話に出た『○○の法則』は?">
    <label class="fld" style="margin-top:16px">選択肢（◯を押すと正解）</label>
    <div id="opts"></div>
    <button class="btn ghost" style="margin-top:4px;font-size:14px;padding:11px" onclick="addOpt()">＋ 選択肢をふやす</button>
    <label class="fld" style="margin-top:18px">制限時間</label>
    <div class="seconds" id="secs">
      <button onclick="setSec(10,this)">10秒</button>
      <button class="on" onclick="setSec(20,this)">20秒</button>
      <button onclick="setSec(30,this)">30秒</button>
      <button onclick="setSec(60,this)">60秒</button>
    </div>
    <label class="fld" style="margin-top:18px">配点（先生が決める）</label>
    <div class="pts">
      <div><input class="txt" id="ptAttend" type="number" step="0.5" value="1"><div class="hint" style="margin-top:4px">出席点</div></div>
      <div><input class="txt" id="ptCorrect" type="number" step="0.5" value="1"><div class="hint" style="margin-top:4px">正解ボーナス</div></div>
    </div>
    <button class="btn mint" onclick="startNow()">今すぐ出題する ▶</button>
    <button class="btn ghost" onclick="saveDraft()">下書きに保存（あとで出す）</button>
    <div id="draftbox" style="margin-top:24px"></div>
    <button class="btn ghost" style="margin-top:18px" onclick="openRoster()">📋 出席簿を見る</button>
    <div class="conn ok" id="conn-make">サーバに接続中…</div>
  </div>

  <!-- 出席簿 -->
  <div id="p-roster" class="card hidden">
    <h1 class="title">出席簿</h1>
    <div class="sub">これまでの出席を、学籍番号ごとにまとめています。</div>
    <div id="roster-summary" class="rsum"></div>
    <div class="rtable-wrap"><div id="roster-table"></div></div>
    <button class="btn mint" onclick="downloadCSV()">CSVでダウンロード</button>
    <button class="btn ghost" onclick="show('p-make')">もどる</button>
  </div>

  <!-- 出題中／集計 -->
  <div id="p-live" class="card hidden">
    <span class="pill" id="t-livepill">受付中…</span>
    <h1 class="title" id="t-liveq"></h1>
    <div class="ringwrap"><div class="ring">
      <svg width="120" height="120"><circle cx="60" cy="60" r="52" fill="none" stroke="#eee" stroke-width="9"/>
      <circle id="t-prog" cx="60" cy="60" r="52" fill="none" stroke="#6c5ce7" stroke-width="9" stroke-linecap="round"/></svg>
      <div class="num" id="t-num">20</div>
    </div></div>
    <div class="tally" id="t-tally"></div>
    <div class="who" id="t-who"></div>
    <button class="btn ghost" onclick="finishLive()">出題をおえる</button>
  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
import { getDatabase, ref, set, onValue, push, remove }
  from "https://www.gstatic.com/firebasejs/11.0.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDFrBTNx6BUhZ7AvLRi5IPojUFJU8m0QrQ",
  authDomain: "hare-attendance.firebaseapp.com",
  databaseURL: "https://hare-attendance-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "hare-attendance",
  storageBucket: "hare-attendance.firebasestorage.app",
  messagingSenderId: "679564882976",
  appId: "1:679564882976:web:bc06fb20db197e9a2cb845"
};
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

function show(id){
  ['p-make','p-live','p-roster'].forEach(p=>document.getElementById(p).classList.add('hidden'));
  const e=document.getElementById(id);e.classList.remove('hidden');
  e.classList.add('pop');setTimeout(()=>e.classList.remove('pop'),400);
}

let limitSec=20;
let opts=[{t:'',correct:false},{t:'',correct:false}];
let tickT=null, liveData=null;

function renderOpts(){
  const box=document.getElementById('opts');box.innerHTML='';
  opts.forEach((o,i)=>{
    const row=document.createElement('div');row.className='opt-row';
    const pick=document.createElement('button');pick.className='opt-pick'+(o.correct?' correct':'');
    pick.textContent=o.correct?'✓':'◯';pick.onclick=()=>markCorrect(i);
    const inp=document.createElement('input');inp.className='txt';inp.placeholder='選択肢 '+(i+1);inp.value=o.t;
    inp.oninput=e=>opts[i].t=e.target.value;
    row.appendChild(pick);row.appendChild(inp);box.appendChild(row);
  });
}
function addOpt(){ if(opts.length>=5)return; opts.push({t:'',correct:false}); renderOpts(); }
function markCorrect(i){ opts.forEach((o,j)=>o.correct=(j===i)); renderOpts(); }
function setSec(s,el){ limitSec=s; document.querySelectorAll('#secs button').forEach(b=>b.classList.remove('on')); el.classList.add('on'); }
window.addOpt=addOpt; window.setSec=setSec;

function buildQuiz(){
  const text=document.getElementById('qtext').value.trim();
  const filled=opts.filter(o=>o.t.trim());
  const correctIdx=opts.filter(o=>o.t.trim()).findIndex(o=>o.correct);
  if(!text){alert('問題文を入れてね');return null;}
  if(filled.length<2){alert('選択肢は2つ以上いれてね');return null;}
  if(correctIdx<0){alert('正解の◯を1つえらんでね');return null;}
  return { text, options:filled.map(o=>o.t.trim()), correctIndex:correctIdx, sec:limitSec,
    ptAttend:parseFloat(document.getElementById('ptAttend').value)||0,
    ptCorrect:parseFloat(document.getElementById('ptCorrect').value)||0, createdAt:Date.now() };
}
function clearEditor(){
  document.getElementById('qtext').value='';
  opts=[{t:'',correct:false},{t:'',correct:false}];renderOpts();
}

async function saveDraft(){
  const q=buildQuiz(); if(!q)return;
  await push(ref(db,'drafts'), q); clearEditor();
  alert('下書きに保存したよ。下の一覧から、当日「出題」を押せます。');
}
window.saveDraft=saveDraft;

function watchDrafts(){
  onValue(ref(db,'drafts'),(snap)=>{
    const box=document.getElementById('draftbox');box.innerHTML='';
    const v=snap.val();
    if(!v){box.innerHTML='<div class="hint">下書きはまだありません</div>';return;}
    const head=document.createElement('div');head.className='fld';head.textContent='下書き（出題を押すと出ます）';box.appendChild(head);
    Object.entries(v).forEach(([key,q])=>{
      const row=document.createElement('div');row.className='draftrow';
      const qt=document.createElement('div');qt.className='qt';qt.textContent=q.text;
      const go=document.createElement('button');go.className='go';go.textContent='出題';go.onclick=()=>startFrom(q,key);
      const del=document.createElement('button');del.className='del';del.textContent='×';del.onclick=()=>remove(ref(db,'drafts/'+key));
      row.appendChild(qt);row.appendChild(go);row.appendChild(del);box.appendChild(row);
    });
  });
}

async function startNow(){ const q=buildQuiz(); if(!q)return; await publish(q); clearEditor(); }
async function startFrom(q,draftKey){ await publish(q); if(draftKey) await remove(ref(db,'drafts/'+draftKey)); }
window.startNow=startNow;

async function publish(q){
  const payload={...q, openAt:Date.now(), endAt:Date.now()+q.sec*1000, status:'open'};
  await set(ref(db,'live'), payload);
  await set(ref(db,'answers'), null);
  runTeacherTimer(payload); show('p-live');
}

function runTeacherTimer(payload){
  const total=payload.sec; const prog=document.getElementById('t-prog'); const C=2*Math.PI*52; prog.style.strokeDasharray=C;
  document.getElementById('t-liveq').textContent=payload.text;
  document.getElementById('t-livepill').textContent='受付中…';
  prog.style.stroke='#6c5ce7';
  const draw=()=>{ const left=Math.max(0,Math.ceil((payload.endAt-Date.now())/1000));
    document.getElementById('t-num').textContent=left; prog.style.strokeDashoffset=C*(1-left/total); return left; };
  draw();
  clearInterval(tickT);
  tickT=setInterval(()=>{ const left=draw(); if(left<=0){ clearInterval(tickT); closeReception(); } },250);
}
async function closeReception(){
  document.getElementById('t-num').textContent='0';
  document.getElementById('t-livepill').textContent='受付しめきり';
  document.getElementById('t-prog').style.stroke='#13c6a5';
  await set(ref(db,'live/status'),'closed');
}

function watchAnswers(){
  onValue(ref(db,'live'),(s)=>{ liveData=s.val(); });
  onValue(ref(db,'answers'),(snap)=>{ renderTally(Object.values(snap.val()||{})); });
}
function renderTally(arr){
  if(!liveData)return;
  const t=document.getElementById('t-tally');
  const n=arr.length;
  const correctN=arr.filter(a=>a.correct).length;
  let rows=`<div class="row"><span>回答した人</span><b>${n}人</b></div>
            <div class="row"><span>正解</span><b>${correctN}人</b></div>`;
  liveData.options.forEach((o,i)=>{
    const c=arr.filter(a=>a.choice===i).length;
    const pct=n?Math.round(c/n*100):0;
    rows+=`<div class="row" style="margin-top:6px"><span>${i===liveData.correctIndex?'⭐️ ':''}${o}</span><b>${c}</b></div>
           <div class="bar"><i style="width:${pct}%;background:${i===liveData.correctIndex?'#13c6a5':'#6c5ce7'}"></i></div>`;
  });
  t.innerHTML=rows;
  const who=document.getElementById('t-who');
  who.innerHTML = n ? '出席：'+arr.map(a=>`<b>${a.id}</b>${a.correct?'◎':'○'}`).join('　') : '';
}
function finishLive(){ clearInterval(tickT); show('p-make'); }
window.finishLive=finishLive;

/* ===== 出席簿 ===== */
let rosterData=null;
function openRoster(){
  show('p-roster');
  document.getElementById('roster-table').innerHTML='<div class="rempty">読み込んでいます…</div>';
  onValue(ref(db,'history'),(snap)=>{
    rosterData=snap.val()||{};
    renderRoster(rosterData);
  });
}
window.openRoster=openRoster;

function renderRoster(hist){
  const days=Object.keys(hist).sort();              // 日付（横の列）
  const ids={};                                      // 学籍番号→{day:record}
  days.forEach(day=>{
    Object.entries(hist[day]||{}).forEach(([id,rec])=>{
      if(!ids[id]) ids[id]={};
      ids[id][day]=rec;
    });
  });
  const idList=Object.keys(ids).sort();

  // サマリー
  const sum=document.getElementById('roster-summary');
  sum.innerHTML=
    `<div class="box"><b>${idList.length}</b><span>のべ人数</span></div>`+
    `<div class="box"><b>${days.length}</b><span>実施日</span></div>`;

  // テーブル
  const tbl=document.getElementById('roster-table');
  if(idList.length===0){ tbl.innerHTML='<div class="rempty">まだ出席の記録がありません</div>'; return; }

  let html='<table class="rt"><thead><tr><th>学籍番号</th>';
  days.forEach(d=>{ html+='<th>'+d.slice(5)+'</th>'; });   // 月-日だけ表示
  html+='<th>出席</th><th>合計点</th></tr></thead><tbody>';

  idList.forEach(id=>{
    html+='<tr><td>'+id+'</td>';
    let attend=0, total=0;
    days.forEach(d=>{
      const r=ids[id][d];
      if(r){
        attend++; total+=(r.score||0);
        html+='<td class="'+(r.correct?'cor':'ok')+'">'+(r.correct?'◎':'○')+'</td>';
      }else{
        html+='<td class="miss">·</td>';
      }
    });
    html+='<td>'+attend+'</td><td>'+total+'</td></tr>';
  });
  html+='</tbody></table>';
  tbl.innerHTML=html;
}

function downloadCSV(){
  if(!rosterData){ alert('まだ読み込み中です'); return; }
  const hist=rosterData;
  const days=Object.keys(hist).sort();
  const ids={};
  days.forEach(day=>{ Object.entries(hist[day]||{}).forEach(([id,rec])=>{ if(!ids[id])ids[id]={}; ids[id][day]=rec; }); });
  const idList=Object.keys(ids).sort();
  if(idList.length===0){ alert('記録がありません'); return; }

  let csv='\uFEFF学籍番号';                          // BOM付きでExcelの文字化け防止
  days.forEach(d=>csv+=','+d);
  csv+=',出席回数,合計点\n';
  idList.forEach(id=>{
    let row=id, attend=0, total=0;
    days.forEach(d=>{
      const r=ids[id][d];
      if(r){ attend++; total+=(r.score||0); row+=','+(r.correct?'正解':'出席'); }
      else{ row+=','; }
    });
    row+=','+attend+','+total;
    csv+=row+'\n';
  });

  const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download='出席簿_'+dayKey(Date.now())+'.csv';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
window.downloadCSV=downloadCSV;

function dayKey(ts){
  const d=new Date(ts); const z=n=>String(n).padStart(2,'0');
  return d.getFullYear()+'-'+z(d.getMonth()+1)+'-'+z(d.getDate());
}

onValue(ref(db,'.info/connected'),(s)=>{
  const ok=s.val()===true;
  const e=document.getElementById('conn-make');
  if(e){ e.textContent= ok?'✓ サーバに接続中':'サーバに接続中…'; e.className='conn'+(ok?' ok':''); }
});

renderOpts(); watchDrafts(); watchAnswers();
</script>
</body>
</html>
